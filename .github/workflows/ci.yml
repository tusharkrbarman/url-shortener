name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run CI smoke tests
        run: >
          python -m unittest
          tests.test_service.LinkServiceTests.test_idempotent_create_returns_original_response
          tests.test_service.LinkServiceTests.test_usage_limit_is_atomic_under_concurrent_redirects
          tests.test_service.HttpApiTests.test_protected_create_requires_authentication

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t url-shortener:${{ github.sha }} .
