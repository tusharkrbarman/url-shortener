name: Deploy AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Prepare Terraform state backend
        id: tfstate
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          BUCKET="url-shortener-terraform-state-${ACCOUNT_ID}-${AWS_REGION}"
          KEY="prod/terraform.tfstate"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names url-shortener >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name url-shortener \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: url-shortener
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_container_image: ${{ steps.ecr.outputs.registry }}/url-shortener:${{ github.sha }}
          TF_VAR_base_url: ${{ vars.BASE_URL }}
          TF_VAR_api_keys: ${{ secrets.API_KEYS }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.bucket }}" \
            -backend-config="key=${{ steps.tfstate.outputs.key }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
          terraform apply -auto-approve
