name: Deploy AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names url-shortener >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name url-shortener \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: url-shortener
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_container_image: ${{ steps.ecr.outputs.registry }}/url-shortener:${{ github.sha }}
          TF_VAR_base_url: ${{ vars.BASE_URL }}
          TF_VAR_api_keys: ${{ secrets.API_KEYS }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform init
          terraform apply -auto-approve
