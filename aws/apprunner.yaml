version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "Building Docker image from Dockerfile"
run:
  command: python -m shortener.main
  network:
    port: 8080
    env: PORT
  env:
    - name: APP_ENV
      value: production
    - name: PORT
      value: "8080"
    - name: SERVICE_MODE
      value: api
    - name: DATABASE_PATH
      value: /app/data/shortener.db
    - name: VALIDATION_ENABLED
      value: "true"
    - name: LOG_LEVEL
      value: info
