services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: 8080
      BASE_URL: http://localhost:8080
      DATABASE_PATH: /app/data/shortener.db
      API_KEYS: dev-api-key
      SERVICE_MODE: api
      VALIDATION_ENABLED: "true"
      LOG_LEVEL: info
    volumes:
      - shortener-data:/app/data

  worker:
    build: .
    environment:
      APP_ENV: development
      DATABASE_PATH: /app/data/shortener.db
      API_KEYS: dev-api-key
      SERVICE_MODE: worker
      VALIDATION_ENABLED: "true"
      LOG_LEVEL: info
    volumes:
      - shortener-data:/app/data

volumes:
  shortener-data:

